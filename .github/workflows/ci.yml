name: OpsAgent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'test-key-ci' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key-ci' }}
          PROMETHEUS_URL: http://localhost:9090
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t opsagent:${{ github.sha }} .

      - name: Verify health endpoint starts
        run: |
          docker run -d --name opsagent-ci \
            -e ANTHROPIC_API_KEY=test-key \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            -p 8000:8000 \
            opsagent:${{ github.sha }}
          sleep 8
          curl -f http://localhost:8000/health
          docker stop opsagent-ci
