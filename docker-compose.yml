services:
  opsagent:
    build: .
    container_name: opsagent
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PROMETHEUS_URL=http://prometheus:9090
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - opsnet

  # Dummy service that simulates high error rates + down status
  api-simulator:
    image: python:3.12-slim
    container_name: api-simulator
    ports:
      - "8001:8001"
    volumes:
      - ./docker/error-service.py:/app/error-service.py:ro
    command: python /app/error-service.py
    networks:
      - opsnet

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opsnet

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - opsnet

volumes:
  prometheus_data:

networks:
  opsnet:
    driver: bridge
