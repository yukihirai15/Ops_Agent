global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "instance"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "opsagent-webhook"

receivers:
  - name: "opsagent-webhook"
    webhook_configs:
      - url: "http://opsagent:8000/webhook/alertmanager"
        send_resolved: false
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
